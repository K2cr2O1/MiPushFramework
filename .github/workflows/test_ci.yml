name: Test CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 必须，否则拿不到tag/历史

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Write key
      run: |
        if [ ! -z "${{ secrets.SIGNING_KEY }}" ]; then
          echo KEYSTORE_PASSWORD='${{ secrets.KEYSTORE_PASSWORD }}' >> local.properties
          echo KEYSTORE_ALIAS='${{ secrets.KEYSTORE_ALIAS }}' >> local.properties
          echo KEY_PASSWORD='${{ secrets.KEY_PASSWORD }}' >> local.properties
          echo KEY_LOCATE='../release.keystore' >> local.properties
          echo ${{ secrets.SIGNING_KEY }} | base64 --decode > release.keystore
        fi

    # 修复：git describe 失败时自动 fallback 到 commit hash
    - name: Get version
      id: version
      run: |
        # 先尝试 describe，排除带 - 的预发布 tag
        VERSION=$(git describe --tags --abbrev=7 --exclude="v*-*" 2>/dev/null || true)
        if [ -z "$VERSION" ]; then
          # 没有tag就用 commit hash
          VERSION="dev-$(git rev-parse --short HEAD)"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Using version: $VERSION"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build -PversionName=${{ steps.version.outputs.version }}

    # 统一收集所有 APK，避免变量错乱
    - name: Collect apks
      run: mkdir -p apks
    - run: cp -f push/build/outputs/apk/*/release/*.apk apks/ 2>/dev/null || true
    - run: cp -f push/build/outputs/apk/*/debug/*.apk apks/ 2>/dev/null || true

    # 一次性上传所有 APK
    - name: Upload all artifacts
      uses: actions/upload-artifact@v4
      with:
        name: apks-${{ steps.version.outputs.version }}
        path: apks/*.apk

    # 发布
    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        name: ${{ steps.version.outputs.version }}
        tag_name: ${{ steps.version.outputs.version }}
        target_commitish: ${{ github.sha }}
        prerelease: true
        files: apks/*.apk
      if: github.event_name == 'push'
